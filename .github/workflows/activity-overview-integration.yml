name: activity-overview integration (live smoke test)

# Live smoke test: runs the real gather -> link -> render pipeline against a real
# repo and window, hitting the GitHub API and cloning the target. This is the
# end-to-end confirmation that the skill still works on real data.
#
# WHEN IT RUNS
#   - Automatically twice a month (1st and 15th) over the trailing 14 days.
#   - On demand via "Run workflow" (workflow_dispatch) with an optional
#     owner/repo/window — use this DURING DEVELOPMENT of every phase to confirm
#     the change works against a real repo before merging.
#
# MAINTENANCE (read this when starting a new phase!)
#   The "Assert" step below encodes the CURRENT bundle contract. Each phase that
#   changes what gather/link/render produce (new fields, new buckets, new
#   sections) MUST update these assertions in the same PR, and the phase is not
#   "done" until this workflow has been run (manually) and is green on real data.
#   The assertions currently cover Phase 2 (open + closed-unmerged PRs, the broad
#   issue set, four-way buckets, workflow_stats/releases/milestones, and the
#   render diagram manifest) PLUS Phase 3a (discussion bodies on PRs/issues,
#   issue reactions + open_high_activity, artifacts lifecycle ledger, unified
#   timeline, feature_deltas projection, and the content_timeline + deltas_bar
#   diagram manifest entries) PLUS Phase 3b (directory code-area provider with
#   non-empty areas on Bicep where graphify is absent, resolved code_area/area
#   on artifacts/feature_deltas, label_taxonomy + facets on every issue/PR +
#   valid kind on every issue, trains.code_areas resolving to known area ids,
#   modules dict with per-area counts, code_owners dict, and the
#   contributor_graph + kind_breakdown entries in the diagrams manifest).
#   PLUS Phase 3c (code_graph.areas[].edges resolved build-only via bicep build ->
#   ARM and terraform graph: well-formed edge objects, at least one Bicep area with
#   a resolved immediate edge carrying a version on a busy Bicep window, and the
#   module_graph entry in the diagrams manifest).
#
# SECRET (one-time): add a repo secret named ACTIVITY_TEST_TOKEN
#   Settings -> Secrets and variables -> Actions -> New repository secret
# Use a classic PAT with the `public_repo` scope (read is all this needs). If the
# target is owned by an enterprise that caps PAT lifetime — e.g. Microsoft Open
# Source, which owns Azure/* — the token's expiry must be <= 90 days or the API
# returns 403; a "no expiration" token is rejected. The scheduled runs will go
# red once the PAT expires until it is rotated. Do NOT paste the token anywhere
# but that secret page.

on:
  schedule:
    # 07:00 UTC on the 1st and 15th of each month (trailing-14-day window).
    - cron: "0 7 1,15 * *"
  workflow_dispatch:
    inputs:
      owner:
        description: "Target repo owner"
        required: false
        default: "Azure"
      repo:
        description: "Target repo name"
        required: false
        default: "bicep-registry-modules"
      from:
        description: "Window start (YYYY-MM-DD; blank = 14 days before --to)"
        required: false
        default: ""
      to:
        description: "Window end (YYYY-MM-DD; blank = today, UTC)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify the integration secret is present
        env:
          ACTIVITY_TEST_TOKEN: ${{ secrets.ACTIVITY_TEST_TOKEN }}
        run: |
          if [ -z "$ACTIVITY_TEST_TOKEN" ]; then
            echo "::error::ACTIVITY_TEST_TOKEN secret is not set. Add it under" \
                 "Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi
          echo "secret present"

      - name: Resolve target and window
        id: cfg
        run: |
          OWNER="${{ inputs.owner }}"; REPO="${{ inputs.repo }}"
          FROM="${{ inputs.from }}"; TO="${{ inputs.to }}"
          # Defaults apply to scheduled runs (no inputs) and blank manual fields.
          [ -z "$OWNER" ] && OWNER="Azure"
          [ -z "$REPO" ] && REPO="bicep-registry-modules"
          [ -z "$TO" ] && TO="$(date -u +%F)"
          [ -z "$FROM" ] && FROM="$(date -u -d "$TO -14 days" +%F)"
          {
            echo "owner=$OWNER"; echo "repo=$REPO"
            echo "from=$FROM"; echo "to=$TO"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved target $OWNER/$REPO over window $FROM -> $TO"

      # graphify is OPTIONAL and intentionally NOT installed here. The directory
      # provider is the primary provider and is what runs on Bicep (graphify does
      # not parse Bicep/HCL). graphify is exercised only via the unit fixture
      # (fixtures/graphify_graph_sample.json) in the offline test suite. Do NOT
      # add a graphify install step to this workflow.

      - name: Install bicep CLI
        run: |
          curl -sSLo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Install terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Gather + link + render a real window
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIVITY_TEST_TOKEN }}
          OWNER: ${{ steps.cfg.outputs.owner }}
          REPO: ${{ steps.cfg.outputs.repo }}
          FROM: ${{ steps.cfg.outputs.from }}
          TO: ${{ steps.cfg.outputs.to }}
        run: |
          cd .claude/skills/activity-overview
          python3 gather.py \
            --owner "$OWNER" --repo "$REPO" \
            --from "$FROM" --to "$TO" \
            --out workspace/bundle.json
          python3 link.py workspace/bundle.json
          # Diagrams: emit + record the manifest. mmdc (and its headless browser)
          # is not installed on the runner, so skip the compile check here — the
          # mmdc validation path is covered by unit tests. This still exercises
          # the real emitters against live data and writes workspace/diagrams/.
          python3 render.py workspace/bundle.json \
            --diagrams-dir workspace/diagrams --skip-validate

      - name: Assert the bundle is well-formed and self-consistent (Phase 3b)
        env:
          FROM: ${{ steps.cfg.outputs.from }}
          TO: ${{ steps.cfg.outputs.to }}
        run: |
          cd .claude/skills/activity-overview
          python3 - <<'PY'
          import json, os, re

          frm, to = os.environ["FROM"], os.environ["TO"]
          b = json.load(open("workspace/bundle.json"))

          assert b["meta"]["schema_version"] == 1, "missing schema_version"
          prs, issues = b["prs"], b["issues"]
          commits, trains, buckets = b["commits"], b["trains"], b["buckets"]
          pr_by = {p["number"]: p for p in prs}
          issue_by = {i["number"]: i for i in issues}
          pr_nums = set(pr_by)
          shas = {c["sha"] for c in commits}

          def well_formed(r):
              return (isinstance(r.get("type"), str) and r.get("id") is not None
                      and str(r.get("url", "")).startswith("https://"))

          def in_win(ts):
              return bool(ts) and frm <= ts[:10] <= to

          def lookup(r):
              return pr_by.get(r["id"]) if r["type"] == "pr" else issue_by.get(r["id"])

          # 1. PR scope (Phase 2): merged-in-window, closed-unmerged-in-window, or open.
          for p in prs:
              assert str(p["url"]).startswith("https://"), p
              ok = ((p["merged"] and in_win(p.get("merged_at")))
                    or (p["state"] == "closed" and not p["merged"] and in_win(p.get("closed_at")))
                    or p["state"] == "open")
              assert ok, f"PR {p['number']} ({p['state']}, merged={p['merged']}) in no Phase-2 scope"

          # 2. Issues well-formed (Phase 2 broadens beyond closing issues).
          for i in issues:
              assert str(i["url"]).startswith("https://"), i

          # 3. Trains group exactly the merged-in-window PRs; ids/evidence/refs sound.
          merged_nums = {p["number"] for p in prs if p["merged"] and in_win(p.get("merged_at"))}
          id_re = re.compile(r"^train-(issue|pr)-\d+$")
          for t in trains:
              assert id_re.match(t["id"]), f"bad train id {t['id']}"
              assert t["outcome"] == "shipped", t["id"]
              assert t["evidence"] and all(well_formed(r) for r in t["evidence"]), t["id"]
              assert set(t["prs"]) <= pr_nums, f"{t['id']} references unknown PR"
              assert set(t["commits"]) <= shas, f"{t['id']} references unknown commit"
              if t["root_issue"] is not None:
                  assert t["id"] == f"train-issue-{t['root_issue']}", t["id"]
          trained = [n for t in trains for n in t["prs"]]
          assert len(trained) == len(set(trained)), "a PR appears in multiple trains"
          assert set(trained) == merged_nums, "trains must group exactly the merged-in-window PRs"

          # 4. Buckets: four keys, well-formed, ONE bucket per item; per-bucket semantics.
          assert set(buckets) == {"shipped", "rejected", "in_flight", "next_candidates"}, "bucket keys"
          seen = {}
          for name, refs in buckets.items():
              for r in refs:
                  assert well_formed(r), f"malformed ref in {name}: {r}"
                  key = (r["type"], r["id"])
                  assert key not in seen, f"{key} appears in both {seen[key]} and {name}"
                  seen[key] = name
          assert {r["id"] for r in buckets["shipped"] if r["type"] == "pr"} == merged_nums, \
              "shipped PR set must equal merged-in-window PRs"
          for r in buckets["rejected"]:
              if r["type"] == "pr":
                  p = pr_by[r["id"]]
                  assert p["state"] == "closed" and not p["merged"], \
                      f"rejected PR {r['id']} is not closed-unmerged"
          for name in ("in_flight", "next_candidates"):
              for r in buckets[name]:
                  it = lookup(r)
                  assert it is not None and it["state"] == "open", \
                      f"{name} ref {r} is not an open item"

          # 5. Phase 2 sections present and self-consistent.
          ws = b.get("workflow_stats", {})
          assert isinstance(ws, dict), "workflow_stats must be a dict"
          for name, s in ws.items():
              assert s["total"] == s["success"] + s["failure"] + s["cancelled"] + s["other"], \
                  f"workflow_stats[{name}] counts do not sum"
          assert isinstance(b.get("releases", []), list), "releases must be a list"
          assert isinstance(b.get("milestones", []), list), "milestones must be a list"
          dg = b.get("diagrams", {})
          assert set(dg) >= {"buckets_pie", "timeline_gantt"}, "diagrams manifest missing keys"
          for name, pth in dg.items():
              assert not str(pth).startswith("workspace/") and str(pth).endswith(".mmd"), \
                  f"diagram {name} path not workspace-relative: {pth}"

          # 6. Phase 3a: discussion bodies on PRs/issues.
          for p in prs:
              assert isinstance(p.get("review_comments", []), list), p["number"]
              assert isinstance(p.get("comments_list", []), list), p["number"]
              for c in p.get("review_comments", []):
                  assert "author" in c and "body" in c \
                      and str(c.get("url", "")).startswith("https://"), c
          for i in issues:
              assert isinstance(i.get("comments_list", []), list), i["number"]
              r = i.get("reactions", {})
              assert set(r) >= {"+1", "-1", "heart", "hooray", "total"}, \
                  f"issue {i['number']} reactions missing keys: {r}"
              assert isinstance(i.get("open_high_activity", False), bool), i["number"]

          # 7. Phase 3a: artifacts ledger — non-empty ordered lifecycle, valid status.
          arts = b.get("artifacts", {})
          assert isinstance(arts, dict), "artifacts must be a dict"
          for aid, a in arts.items():
              assert a["kind"] in {"example", "doc", "readme"}, \
                  f"{aid} unexpected kind {a['kind']} (symbol/comment deferred)"
              assert a["status"] in {"live", "removed", "replaced"}, aid
              assert a["lifecycle"], f"{aid} has empty lifecycle"
              for ev in a["lifecycle"]:
                  assert ev["event"] in {"add", "change", "remove"}, aid
                  assert well_formed(ev["ref"]) and ev["ref"]["type"] == "commit", aid
              if a["status"] == "replaced":
                  assert a["replaced_by"] in arts, f"{aid} replaced_by dangles"

          # 8. Phase 3a: timeline — well-formed events, layer in {social,code}.
          tl = b.get("timeline", [])
          assert isinstance(tl, list), "timeline must be a list"
          for e in tl:
              assert e["layer"] in {"social", "code"}, e
              assert "actor" in e and "event" in e and "ts" in e, e
              assert isinstance(e.get("ref"), dict) \
                  and str(e["ref"].get("url", "")).startswith("https://"), e
              assert set(e.get("subject", {})) >= {"kind", "name", "path"}, e
          assert [e["ts"] for e in tl] == sorted(e["ts"] for e in tl), \
              "timeline must be sorted by ts"

          # 9. Phase 3a: feature_deltas reference real artifacts; kinds valid.
          for d in b.get("feature_deltas", []):
              assert d["kind"] in {"add", "drop", "change"}, d
              assert d["artifact"] in arts, f"delta references unknown artifact {d['artifact']}"
              assert str(d.get("url", "")).startswith("https://"), d
              if d.get("pr") is not None:
                  assert d["pr"] in pr_by, f"delta pr {d['pr']} unknown"

          # 10. Phase 3a: diagrams manifest now includes the two new diagrams.
          assert set(dg) >= {"buckets_pie", "timeline_gantt",
                             "content_timeline", "deltas_bar"}, \
              "diagrams manifest missing Phase 3a keys"

          # 11. Phase 3b: code_graph is the directory provider with non-empty areas.
          cg = b.get("code_graph", {})
          assert cg.get("provider") == "directory", \
              f"expected directory provider on Bicep (graphify absent), got {cg.get('provider')}"
          areas = cg.get("areas", [])
          assert areas, "code_graph.areas is empty — directory provider produced no areas"
          area_ids = set()
          for a in areas:
              assert a.get("id") and isinstance(a.get("paths"), list) and a["paths"], \
                  f"area missing id/paths: {a}"
              assert isinstance(a.get("edges"), list), f"area edges must be a list: {a}"
              area_ids.add(a["id"])

          # 12. Phase 3b: code_area/area now RESOLVE (no longer all null) where covered.
          arts = b.get("artifacts", {})
          attributed_art = sum(1 for a in arts.values() if a.get("code_area") is not None)
          for a in arts.values():
              if a.get("code_area") is not None:
                  assert a["code_area"] in area_ids, \
                      f"artifact code_area {a['code_area']} not a known area"
          deltas = b.get("feature_deltas", [])
          for d in deltas:
              if d.get("area") is not None:
                  assert d["area"] in area_ids, f"delta area {d['area']} not a known area"
          # On a busy Bicep window the directory provider must attribute SOMETHING.
          if arts:
              assert attributed_art > 0, \
                  "no artifact resolved to a code area — attribution is broken"

          # 13. Phase 3b: label_taxonomy present (possibly empty) + facets/kind on issues.
          tax = b.get("label_taxonomy", {})
          assert "source" in tax, "label_taxonomy missing source marker"
          assert tax["source"] in {"auto", "config", "merged"}, tax["source"]
          valid_kinds = {"feature", "module-request", "bug", "idea",
                         "question", "docs", "other"}
          for i in issues:
              f = i.get("facets", {})
              assert set(f) >= {"area", "priority", "status", "lifecycle"}, \
                  f"issue {i['number']} facets missing keys: {f}"
              assert i.get("kind") in valid_kinds, \
                  f"issue {i['number']} kind {i.get('kind')} invalid"
          for p in prs:
              f = p.get("facets", {})
              assert set(f) >= {"area", "priority", "status", "lifecycle"}, \
                  f"pr {p['number']} facets missing keys: {f}"

          # 14. Phase 3b: trains carry code_areas; modules populated; people areas.
          for t in trains:
              assert isinstance(t.get("code_areas", []), list), t["id"]
              for area in t.get("code_areas", []):
                  assert area in area_ids, f"{t['id']} code_area {area} unknown"
          mods = b.get("code_owners", {})
          assert isinstance(mods, dict), "code_owners must be a dict"
          modules = b.get("modules", {})
          assert isinstance(modules, dict), "modules must be a dict"
          for area, m in modules.items():
              assert isinstance(m.get("commits"), int) and m["commits"] >= 0 \
                  and m.get("files_changed", 0) >= 1, \
                  f"modules[{area}] has invalid counts: {m}"

          # 15. Phase 3b: diagrams manifest now includes the two new diagrams.
          assert set(dg) >= {"buckets_pie", "timeline_gantt", "content_timeline",
                             "deltas_bar", "contributor_graph", "kind_breakdown"}, \
              "diagrams manifest missing Phase 3b keys"

          # 16. Phase 3c: edges are well-formed; bicep edges resolve with versions.
          all_edges = [e for a in areas for e in a.get("edges", [])]
          for e in all_edges:
              assert e.get("kind") == "module", f"unexpected edge kind: {e}"
              assert e.get("provider") in {"bicep", "terraform"}, f"bad edge provider: {e}"
              assert isinstance(e.get("transitive"), bool), e
              assert isinstance(e.get("resolved"), bool), e
              assert ("to" in e) and ("ref" in e) and ("version" in e), e
              if e["resolved"]:
                  assert e["to"] is not None, e
          bicep_imm = [e for e in all_edges
                       if e["provider"] == "bicep" and not e["transitive"] and e["resolved"]]
          # On a busy Bicep window with the CLI installed, at least one module edge
          # must resolve with a version (proves bicep build -> ARM lit up).
          if any(p["merged"] for p in prs):
              assert bicep_imm, "no resolved Bicep edges — bicep build path did not light up"
              assert any(e["version"] for e in bicep_imm), \
                  "resolved Bicep edges carry no version"
          assert "module_graph" in dg, "diagrams manifest missing module_graph"
          print(f"  phase3c: edges={len(all_edges)} "
                f"bicep_resolved_immediate={len(bicep_imm)} "
                f"with_version={sum(1 for e in bicep_imm if e['version'])}")

          print(f"OK prs={len(prs)} (merged={len(merged_nums)} "
                f"open={sum(1 for p in prs if p['state'] == 'open')} "
                f"closed_unmerged={sum(1 for p in prs if p['state'] == 'closed' and not p['merged'])}) "
                f"issues={len(issues)} commits={len(commits)} trains={len(trains)} "
                f"buckets[shipped={len(buckets['shipped'])} in_flight={len(buckets['in_flight'])} "
                f"rejected={len(buckets['rejected'])} next={len(buckets['next_candidates'])}] "
                f"workflows={len(ws)} releases={len(b.get('releases', []))} "
                f"milestones={len(b.get('milestones', []))}")
          print(f"  phase3a: artifacts={len(arts)} timeline={len(tl)} "
                f"feature_deltas={len(b.get('feature_deltas', []))} "
                f"pr_review_comments={sum(len(p.get('review_comments', [])) for p in prs)}")
          print(f"  phase3b: provider={cg.get('provider')} areas={len(areas)} "
                f"attributed_artifacts={attributed_art} modules={len(modules)} "
                f"label_taxonomy_source={tax.get('source')} "
                f"code_owners={len(b.get('code_owners', {}))}")
          if not merged_nums:
              print("::warning::no merged PRs in window — shipped/trains held "
                    "vacuously; pick a busier window")
          PY

      - name: Upload the bundle + diagrams
        uses: actions/upload-artifact@v6
        with:
          name: activity-bundle
          path: |
            .claude/skills/activity-overview/workspace/bundle.json
            .claude/skills/activity-overview/workspace/diagrams/*.mmd
          if-no-files-found: error
