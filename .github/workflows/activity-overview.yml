name: activity-overview

# One end-to-end pipeline for the activity-overview skill:
#   tests (offline, every push/PR)  ->  live (real gather -> journey-graph
#   store -> trust audit, on demand / scheduled / on a push to the default
#   branch). The journey-graph store is the deliverable; `validate.py` is the
#   gate that proves the graph is trustworthy. The live job intentionally stops
#   at the trust gate (gather -> validate); the offline report vertical
#   (extract -> link -> render) is covered by the test suite and needs
#   mmdc/graphify, so it is not re-run live here.

on:
  push:
    paths:
      - ".claude/skills/activity-overview/**"
      - ".github/workflows/activity-overview.yml"
  pull_request:
    paths:
      - ".claude/skills/activity-overview/**"
      - ".github/workflows/activity-overview.yml"
  workflow_dispatch:
    inputs:
      owner:
        description: "Target repo owner"
        required: false
        default: "Azure"
      repo:
        description: "Target repo name"
        required: false
        default: "bicep-registry-modules"
      from:
        description: "Window start (YYYY-MM-DD; blank = 14 days before --to)"
        required: false
        default: ""
      to:
        description: "Window end (YYYY-MM-DD; blank = today, UTC)"
        required: false
        default: ""
  schedule:
    # 07:00 UTC on the 1st and 15th of each month (trailing-14-day window).
    - cron: "0 7 1,15 * *"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile the CLIs
        run: |
          python -m py_compile \
            .claude/skills/activity-overview/gather.py \
            .claude/skills/activity-overview/link.py \
            .claude/skills/activity-overview/graphstore.py \
            .claude/skills/activity-overview/extract.py \
            .claude/skills/activity-overview/derive.py \
            .claude/skills/activity-overview/complete.py \
            .claude/skills/activity-overview/validate.py \
            .claude/skills/activity-overview/spotlight.py \
            .claude/skills/activity-overview/manifest.py \
            .claude/skills/activity-overview/manifest_from_index.py \
            .claude/skills/activity-overview/digest.py \
            .claude/skills/activity-overview/ci_spotlight_integration.py

      - name: Run the offline test suite
        run: |
          python -m unittest discover \
            -s .claude/skills/activity-overview -p 'test_*.py' -v

  live:
    # The real gather is heavy (clone + API) and needs the ACTIVITY_TEST_TOKEN
    # secret (never exposed to fork PRs), so it runs only on demand, on the
    # schedule, or on a push to the default branch — not on every feature push.
    needs: tests
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify the integration secret is present
        env:
          ACTIVITY_TEST_TOKEN: ${{ secrets.ACTIVITY_TEST_TOKEN }}
        run: |
          if [ -z "$ACTIVITY_TEST_TOKEN" ]; then
            echo "::error::ACTIVITY_TEST_TOKEN secret is not set. Add it under" \
                 "Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi
          echo "secret present"

      - name: Resolve target and window
        id: cfg
        run: |
          OWNER="${{ inputs.owner }}"; REPO="${{ inputs.repo }}"
          FROM="${{ inputs.from }}"; TO="${{ inputs.to }}"
          # Defaults apply to scheduled runs (no inputs) and blank manual fields.
          [ -z "$OWNER" ] && OWNER="Azure"
          [ -z "$REPO" ] && REPO="bicep-registry-modules"
          [ -z "$TO" ] && TO="$(date -u +%F)"
          [ -z "$FROM" ] && FROM="$(date -u -d "$TO -14 days" +%F)"
          {
            echo "owner=$OWNER"; echo "repo=$REPO"
            echo "from=$FROM"; echo "to=$TO"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved target $OWNER/$REPO over window $FROM -> $TO"

      - name: Install bicep CLI
        env:
          # Pinned so the gate is reproducible and a new bicep release cannot
          # silently change build output. Bump deliberately.
          BICEP_VERSION: v0.43.8
        run: |
          curl -sSLo bicep "https://github.com/Azure/bicep/releases/download/${BICEP_VERSION}/bicep-linux-x64"
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          installed="$(bicep --version)"
          echo "$installed"
          case "$installed" in
            *"${BICEP_VERSION#v}"*) ;;
            *) echo "::error::bicep version mismatch: wanted ${BICEP_VERSION}, got '$installed'"; exit 1 ;;
          esac

      - name: Gather the real window into the journey-graph store
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIVITY_TEST_TOKEN }}
          OWNER: ${{ steps.cfg.outputs.owner }}
          REPO: ${{ steps.cfg.outputs.repo }}
          FROM: ${{ steps.cfg.outputs.from }}
          TO: ${{ steps.cfg.outputs.to }}
        run: |
          cd .claude/skills/activity-overview
          mkdir -p workspace
          python gather.py \
            --owner "$OWNER" --repo "$REPO" \
            --from "$FROM" --to "$TO" \
            --store workspace/journey.db

      - name: Store sanity (gather produced a non-trivial graph)
        run: |
          cd .claude/skills/activity-overview
          python - <<'PY'
          import graphstore
          c = graphstore.open_store("workspace/journey.db")
          n = c.execute("SELECT COUNT(*) FROM nodes").fetchone()[0]
          e = c.execute("SELECT COUNT(*) FROM edges").fetchone()[0]
          ce = c.execute("SELECT COUNT(*) FROM code_events").fetchone()[0]
          print(f"store: nodes={n} edges={e} code_events={ce}")
          assert n > 0 and e > 0, "empty graph — gather produced nothing"
          PY

      - name: Trust gate — audit the real journey-graph
        run: |
          cd .claude/skills/activity-overview
          # validate self-sources the raw bundle from the store (no bundle file);
          # exits non-zero on any ERROR-severity trust violation.
          python validate.py workspace/journey.db

      - name: Upload the journey-graph store
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: journey-graph
          path: .claude/skills/activity-overview/workspace/journey.db
          if-no-files-found: warn

  spotlight:
    # Build a real db for a FIXED historical AVM week and run all four spotlight
    # queries against it — "query it exactly as real execution would", not a mock
    # and not a crafted fixture. The window is pinned (early March 2026): historical
    # data does not change, so the gathered graph is stable and the gate is
    # reproducible run to run. Heavy (clone + API) and needs the ACTIVITY_TEST_TOKEN
    # secret, so it is gated like `live` — on demand, on schedule, or on a push to
    # the default branch, never on a feature/fork PR.
    needs: tests
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    env:
      # Pinned historical week. Bump deliberately (and re-confirm assertions hold).
      SPOTLIGHT_FROM: "2026-03-02"
      SPOTLIGHT_TO: "2026-03-08"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify the integration secret is present
        env:
          ACTIVITY_TEST_TOKEN: ${{ secrets.ACTIVITY_TEST_TOKEN }}
        run: |
          if [ -z "$ACTIVITY_TEST_TOKEN" ]; then
            echo "::error::ACTIVITY_TEST_TOKEN secret is not set. Add it under" \
                 "Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi
          echo "secret present"

      - name: Gather the fixed historical window into a journey-graph store
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIVITY_TEST_TOKEN }}
        run: |
          cd .claude/skills/activity-overview
          mkdir -p workspace
          python gather.py \
            --owner Azure --repo bicep-registry-modules \
            --from "$SPOTLIGHT_FROM" --to "$SPOTLIGHT_TO" \
            --store workspace/journey_spotlight.db

      - name: Trust gate — audit the gathered graph
        run: |
          cd .claude/skills/activity-overview
          python validate.py workspace/journey_spotlight.db

      - name: Spotlight integration — run all four queries against the real store
        run: |
          cd .claude/skills/activity-overview
          python ci_spotlight_integration.py --store workspace/journey_spotlight.db

      - name: Upload the journey-graph store
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: journey-graph-spotlight
          path: .claude/skills/activity-overview/workspace/journey_spotlight.db
          if-no-files-found: warn

  constellation:
    # Multi-repo (Phase 9) gate. Dogfoods the whole project vertical on a SMALL
    # fixed AVM-Terraform constellation: generate the manifest from a committed
    # index slice (manifest_from_index.py), gather both members into ONE project
    # store, prove the project graph is trustworthy (validate --project), and assert
    # the digest resolves a CROSS-REPO module-dependency edge (the pattern sourcing
    # the resource module). Terraform is installed so the real `terraform init` +
    # `terraform graph` DOT extraction runs on real modules (parity with the bicep
    # live/spotlight gates); the static whole-tree source scan still backstops the
    # cross-repo edge if a heavy `init` times out. Pinned historical window ->
    # reproducible. Heavy (2 clones + API + terraform init) + needs the token, so
    # gated like live/spotlight: on demand, on schedule, or on a default-branch
    # push — never on a feature/fork PR.
    needs: tests
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    env:
      PROJECT: avm-tf-ci-constellation
      # Pinned historical week (stable, reproducible). Bump deliberately.
      C_FROM: "2026-03-16"
      C_TO: "2026-03-22"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Terraform
        env:
          # Pinned so the gate is reproducible and a new terraform release cannot
          # silently change graph output. Bump deliberately. Raw binary (no wrapper)
          # so `terraform graph` DOT reaches the extractor unmodified.
          TERRAFORM_VERSION: 1.15.5
        run: |
          base="https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}"
          curl -sSLo tf.zip "${base}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          curl -sSLo tf.sums "${base}/terraform_${TERRAFORM_VERSION}_SHA256SUMS"
          # Verify the official checksum before unpacking (supply-chain integrity).
          grep " terraform_${TERRAFORM_VERSION}_linux_amd64.zip$" tf.sums | sha256sum -c -
          unzip -o tf.zip terraform
          sudo mv terraform /usr/local/bin/terraform
          installed="$(terraform version | head -1)"
          echo "$installed"
          case "$installed" in
            *"${TERRAFORM_VERSION}"*) ;;
            *) echo "::error::terraform version mismatch: wanted ${TERRAFORM_VERSION}, got '$installed'"; exit 1 ;;
          esac

      - name: Verify the integration secret is present
        env:
          ACTIVITY_TEST_TOKEN: ${{ secrets.ACTIVITY_TEST_TOKEN }}
        run: |
          if [ -z "$ACTIVITY_TEST_TOKEN" ]; then
            echo "::error::ACTIVITY_TEST_TOKEN secret is not set. Add it under" \
                 "Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi
          echo "secret present"

      - name: Generate the manifest from the committed AVM-index slice
        run: |
          cd .claude/skills/activity-overview
          mkdir -p workspace
          python manifest_from_index.py --index ci/constellation-index.csv \
            --project "$PROJECT" --from "$C_FROM" --to "$C_TO" \
            > workspace/manifest.json
          echo "--- generated manifest ---"; cat workspace/manifest.json

      - name: Gather the constellation into one project store
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIVITY_TEST_TOKEN }}
          # terraform init for an AVM pattern pulls many registry modules: a shared
          # plugin cache avoids re-downloading providers, and each init gets room. A
          # heavy init that still times out degrades gracefully — edge_extraction
          # records timeout/failed and the static whole-tree source scan still
          # backstops the cross-repo edge. Parallel extraction stays safe because
          # gather's prewarm populates the cache for EVERY area serially before the
          # parallel inits (cache hits, no write race) — so we keep the default
          # workers rather than serializing.
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.claude/skills/activity-overview/workspace/.tfcache
          ACTIVITY_IAC_BUILD_TIMEOUT: "600"
        run: |
          cd .claude/skills/activity-overview
          mkdir -p workspace/.tfcache
          python gather.py --manifest workspace/manifest.json \
            --store workspace/journey.db

      - name: Trust gate — validate the whole project graph
        run: |
          cd .claude/skills/activity-overview
          python validate.py workspace/journey.db --project "$PROJECT"

      - name: Digest resolves a cross-repo module-dependency edge
        run: |
          cd .claude/skills/activity-overview
          python digest.py --store workspace/journey.db --project "$PROJECT" \
            --from "$C_FROM" --to "$C_TO" > workspace/digest_view.json
          python - <<'PY'
          import json
          v = json.load(open("workspace/digest_view.json"))
          edges = v["module_edges"]
          xrepo = [e for e in edges if e["cross_repo"]]
          print("members={} trains={} module_edges={} cross_repo={}".format(
              len(v["members"]), len(v["trains"]), len(edges), len(xrepo)))
          for e in xrepo:
              print("  {}/{} -> {}/{} {}".format(
                  e["src_repo"].split("/")[-1], e["src_area"],
                  e["dst_repo"].split("/")[-1], e["dst_area"], e.get("version")))
          assert len(v["members"]) == 2, "expected both members in the project view"
          assert xrepo, "expected >=1 cross-repo module-dependency edge"
          PY

      - name: Upload the project store + digest view
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: journey-graph-constellation
          path: |
            .claude/skills/activity-overview/workspace/journey.db
            .claude/skills/activity-overview/workspace/digest_view.json
          if-no-files-found: warn

